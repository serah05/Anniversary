<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anniversary Letter</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #1e1e2f, #2c2c54);
  overflow: hidden;
}

/* container full screen */
.container {
  width: 100%;
  max-width: 500px;
  padding: 20px;
  text-align: center;
}

/* intro */
#introText {
  color: #ffffffcc;
  font-size: 16px;
  margin-bottom: 15px;
  transition: 0.5s;
}

.btn {
  padding: 10px 24px;
  border-radius: 30px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.1);
  color: #fff;
  cursor: pointer;
  backdrop-filter: blur(10px);
}

/* glass card */
.paper {
  display: none;
  width: 100%;
  height: 75vh;
  overflow-y: auto;
  padding: 25px;
  border-radius: 16px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  color: #f5f5f5;
  text-align: left;
  line-height: 1.7;
  animation: floatIn 1s ease;
}

.text {
  white-space: pre-wrap;
  font-size: 12px;
}

/* cursor */
.cursor {
  display: inline-block;
  width: 2px;
  height: 16px;
  background: #fff;
  margin-left: 3px;
  animation: blink 1s infinite;
}

/* floating hearts */
.heart {
  position: absolute;
  bottom: -20px;
  font-size: 12px;
  opacity: 0.15;
  animation: floatUp linear infinite;
  color: green;
}

@keyframes floatUp {
  0% {
    transform: translateY(0);
    opacity: 0;
  }
  20% {
    opacity: 0.5;
  }
  80% {
    opacity: 0.5;
  }
  100% {
    transform: translateY(-110vh);
    opacity: 0;
  }
}
/* scrollbar */
.paper::-webkit-scrollbar {
  width: 4px;
}
.paper::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
}
</style>
</head>

<body>

<!-- 🎵 background music -->
<audio id="bgMusic" loop>
  <source src="bgmusic.mp3" type="audio/mpeg">
</audio>

<div class="container">
  <div id="introText">Happy Anniversary!💌</div>
  <button class="btn" onclick="showLetter()"> Open the Letter</button>

  <div class="paper" id="letterBox">
    <div class="text" id="typedText"></div><span class="cursor"></span>
  </div>
</div>

<script>
const message = `Happy 1st anniversary, my love 🤍

Sa pagitan ng mga sandaling tahimik at magulo,
Naroon ang ating kuwento—hindi perpekto, ngunit buo.
Isang taon na ang lumipas, tila saglit lamang sa pakiramdam,
Ngunit sa bawat tibok ng puso, ika’y naging aking tahanan.

May mga araw na tila bagyo ang ating damdamin,
Salitang nagiging sugat, katahimika’y umaalingawngaw sa atin.
Ngunit sa bawat unos na dumaan sa ating pagitan,
Mas tumibay ang pag-ibig—di kailanman natin binitawan.

At kung muling isusulat ang ating tadhana,
Ikaw pa rin ang hahanapin ng aking kaluluwa.
Sapagkat sa bawat pahina ng ating pinagdaanan,
Ikaw ang aking simula, gitna… at walang katapusang hanggan.

Happy Anniversary Baby, I love you so much!`;

function showLetter() {
  document.getElementById("introText").style.opacity = 0;
  document.querySelector(".btn").style.display = "none";

  // play music (mobile safe)
  const music = document.getElementById("bgMusic");
  music.play().catch(() => {
    document.body.addEventListener('click', () => music.play(), { once: true });
  });

  setTimeout(() => {
    const letterBox = document.getElementById("letterBox");
    const typedText = document.getElementById("typedText");

    letterBox.style.display = "block";

    let i = 0;
    function typeWriter() {
      if (i < message.length) {
        typedText.innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter, 18);
      }
    }

    typeWriter();
  }, 400);
}

/* 💖 subtle floating hearts */
function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (6 + Math.random() * 6) + "s";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 12000);
}

setInterval(createHeart, 1200);
</script>

</body>
</html>
